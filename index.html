<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17251b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="78计划">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>78计划</title>
  <style>
    :root {
      --bg: #f4f2ec;
      --surface: #fffdf8;
      --surface-2: #f8f5ee;
      --ink: #17251b;
      --muted: #687064;
      --line: #ded8ca;
      --brand: #2f6f4e;
      --brand-2: #173f2d;
      --accent: #d88a3d;
      --accent-soft: #fff0df;
      --good: #2f7d57;
      --danger: #b85742;
      --shadow: 0 14px 38px rgba(23, 37, 27, 0.1);
      --radius: 8px;
      --nav-h: 74px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -8%, rgba(216, 138, 61, 0.16), transparent 30%),
        linear-gradient(180deg, #f8f5ee 0%, var(--bg) 48%, #efeadf 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 520px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -16px -14px 12px;
      padding: max(16px, env(safe-area-inset-top)) 14px 12px;
      background: rgba(244, 242, 236, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(222, 216, 202, 0.6);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .screen {
      display: none;
      animation: rise 180ms ease-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      padding: 16px;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(145deg, #173f2d 0%, #2f6f4e 58%, #5c8c57 100%);
      box-shadow: var(--shadow);
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .hero small {
      display: block;
      opacity: 0.75;
      font-size: 12px;
    }

    .hero strong {
      display: block;
      margin-top: 5px;
      font-size: clamp(38px, 13vw, 60px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .hero .unit {
      font-size: 14px;
      opacity: 0.78;
      margin-left: 4px;
    }

    .quest-card {
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .quest-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .quest-bar,
    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .quest-bar i,
    .bar i {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: #fff;
      transition: width 180ms ease;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .quick-btn {
      min-height: 48px;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-weight: 750;
      box-shadow: 0 8px 20px rgba(23, 37, 27, 0.08);
    }

    .quick-btn.primary {
      color: #fff;
      background: var(--accent);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .section-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .flat-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .macro-grid,
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .macro {
      padding: 12px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .macro span,
    .stat span,
    label span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .macro strong,
    .stat strong {
      display: block;
      margin-top: 5px;
      font-size: 20px;
      line-height: 1.1;
    }

    .macro .bar {
      margin-top: 10px;
      background: #ece7dc;
    }

    .macro .bar i {
      background: var(--brand);
    }

    .meal-list {
      display: grid;
      gap: 10px;
    }

    .meal-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .meal-row h3 {
      margin: 0;
      font-size: 16px;
    }

    .meal-row p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .meal-score {
      min-width: 74px;
      text-align: right;
      font-weight: 760;
      color: var(--brand-2);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .tabs button {
      min-height: 42px;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      font-weight: 750;
    }

    .tabs button.active {
      color: #fff;
      background: var(--brand);
      box-shadow: 0 8px 18px rgba(47, 111, 78, 0.22);
    }

    .snack-tabs button.active {
      color: #fff;
      background: var(--brand);
    }

    .snack-tabs {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .snack-tabs.show {
      display: grid;
    }

    .snack-toggle {
      width: 100%;
      min-height: 40px;
      margin-top: 8px;
      border-radius: var(--radius);
      color: var(--brand-2);
      background: #e7efe6;
      font-weight: 800;
    }

    .entry-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .entry-chip {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .range-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .range-tools .actions {
      grid-column: 1 / -1;
      margin-top: 0;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .full {
      grid-column: 1 / -1;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
      font-size: 16px;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47, 111, 78, 0.14);
    }

    input:disabled {
      color: #8d948b;
      background: #f1eee6;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      min-height: 46px;
      border-radius: var(--radius);
      padding: 10px 12px;
      color: #fff;
      background: var(--brand);
      font-weight: 800;
    }

    .btn.secondary {
      color: var(--brand-2);
      background: #e7efe6;
    }

    .btn.warn {
      color: var(--danger);
      background: #f9e6df;
    }

    .btn.full {
      grid-column: 1 / -1;
    }

    .hint {
      color: var(--brand-2);
      background: #e7efe6;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .mini {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .chart-wrap {
      overflow: hidden;
    }

    .chart {
      width: 100%;
      height: 260px;
      display: block;
    }

    .chart-label {
      fill: var(--muted);
      font-size: 12px;
    }

    .chart line,
    .chart path {
      vector-effect: non-scaling-stroke;
    }

    .history {
      display: grid;
      gap: 10px;
      max-height: 320px;
      overflow: auto;
    }

    .history-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }

    .history-item strong {
      display: block;
    }

    .history-item p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 30;
      width: min(100%, 520px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      background: rgba(255, 253, 248, 0.94);
      border-top: 1px solid rgba(222, 216, 202, 0.9);
      backdrop-filter: blur(16px);
      box-shadow: 0 -12px 34px rgba(23, 37, 27, 0.1);
    }

    .bottom-nav button {
      min-height: 48px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .bottom-nav button.active {
      color: #fff;
      background: var(--ink);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);
      z-index: 50;
      width: min(calc(100% - 28px), 492px);
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      border-radius: var(--radius);
      padding: 13px 14px;
      color: #fff;
      background: var(--ink);
      box-shadow: var(--shadow);
      font-size: 14px;
      line-height: 1.45;
    }

    .toast strong {
      display: block;
      margin-bottom: 2px;
      font-size: 16px;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .install {
      display: none;
    }

    @media (min-width: 840px) {
      .app {
        width: min(100% - 40px, 1040px);
        padding-bottom: 32px;
      }

      .desktop-grid {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 14px;
        align-items: start;
      }

      .bottom-nav {
        top: 16px;
        bottom: auto;
        left: auto;
        right: 24px;
        width: 360px;
        transform: none;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
    }

    @media (max-width: 380px) {
      .macro-grid,
      .stat-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>78计划</h1>
        <p>饮食记录、体重趋势和每日任务</p>
      </div>
      <button class="pill install" id="installBtn" type="button">添加到手机</button>
      <span class="pill" id="todayPill"></span>
    </header>

    <section class="screen active" data-screen="home">
      <div class="desktop-grid">
        <div>
          <div class="hero">
            <div class="hero-head">
              <div>
                <small>今天还可以吃</small>
                <strong><span id="remainingCalories">0</span><span class="unit">kcal</span></strong>
              </div>
              <span class="pill" id="streakPill">连续 0 天</span>
            </div>
            <div class="quest-card">
              <div class="quest-top">
                <span id="questTitle">今日任务</span>
                <b id="questScore">0 / 100</b>
              </div>
              <div class="quest-bar"><i id="questBar"></i></div>
            </div>
          </div>

          <div class="quick-grid">
            <button class="quick-btn primary" type="button" data-go="log">记录一餐</button>
            <button class="quick-btn" type="button" data-go="trend">看 7 日变化</button>
          </div>

          <div class="section-title">
            <div>
              <h2>碳蛋脂进度</h2>
              <p id="macroModeLabel">532 模式</p>
            </div>
          </div>
          <div class="macro-grid" id="macroGrid"></div>
        </div>

        <div>
          <div class="section-title">
            <div>
              <h2>今日三餐</h2>
              <p>保存一餐就会更新任务分</p>
            </div>
          </div>
          <div class="meal-list" id="mealList"></div>

          <div class="section-title">
            <div>
              <h2>即时建议</h2>
              <p>按剩余缺口给你补齐方向</p>
            </div>
          </div>
          <div class="hint" id="adviceBox"></div>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="log">
      <div class="section-title">
        <div>
          <h2>记录今天</h2>
          <p>先选餐别，再填这餐的碳蛋脂</p>
        </div>
      </div>

      <div class="card">
        <div class="form-grid">
          <label><span>日期</span><input id="logDate" type="date"></label>
          <label><span>晨重 kg</span><input id="bodyWeight" type="number" min="30" max="250" step="0.1" placeholder="80.0"></label>
        </div>
        <div class="tabs" style="margin-top:12px;">
          <button type="button" class="active" data-meal-tab="breakfast">早餐</button>
          <button type="button" data-meal-tab="lunch">午餐</button>
          <button type="button" data-meal-tab="dinner">晚餐</button>
        </div>
        <button class="snack-toggle" id="snackToggle" type="button">加餐</button>
        <div class="snack-tabs" id="snackTabs">
          <button class="btn secondary" type="button" data-meal-tab="morningSnack">上午加餐</button>
          <button class="btn secondary" type="button" data-meal-tab="afternoonSnack">下午加餐</button>
          <button class="btn secondary" type="button" data-meal-tab="eveningSnack">晚上加餐</button>
        </div>
        <div class="form-grid" style="margin-top:12px;">
          <label><span>热量 kcal，可选</span><input id="mealCalories" type="number" min="0" step="1" placeholder="留空则按碳蛋脂估算"></label>
          <label><span>碳水 g</span><input id="mealCarbs" type="number" min="0" step="0.1" placeholder="手动输入"></label>
          <label><span>蛋白 g</span><input id="mealProtein" type="number" min="0" step="0.1" placeholder="手动输入"></label>
          <label><span>脂肪 g</span><input id="mealFat" type="number" min="0" step="0.1" placeholder="手动输入"></label>
          <label class="full"><span>备注</span><textarea id="note" placeholder="比如：午餐米饭、牛肉、青菜。"></textarea></label>
        </div>
        <div class="actions">
          <button class="btn" id="saveLog" type="button">追加这次记录</button>
          <button class="btn secondary" id="copyMeal" type="button">复制到下一餐</button>
          <button class="btn warn full" id="clearMeal" type="button">清空输入框</button>
        </div>
      </div>

      <div class="section-title">
        <div>
          <h2>今日合计</h2>
          <p>热量优先采用你填写的 kcal，没填则自动估算</p>
        </div>
      </div>
      <div class="stat-grid" id="todayTotals"></div>
    </section>

    <section class="screen" data-screen="trend">
      <div class="section-title">
        <div>
          <h2>体重趋势</h2>
          <p>默认看最近 7 天，也可以手选区间</p>
        </div>
      </div>
      <div class="card" style="margin-bottom:12px;">
        <div class="range-tools">
          <label><span>开始日期</span><input id="trendStart" type="date"></label>
          <label><span>结束日期</span><input id="trendEnd" type="date"></label>
          <div class="actions">
            <button class="btn secondary" id="last7Trend" type="button">最近 7 天</button>
            <button class="btn secondary" id="allTrend" type="button">全部记录</button>
          </div>
        </div>
        <div class="hint" id="trendAdvice" style="margin-top:12px;">保存晨重后，这里会分析减脂速度。</div>
      </div>
      <div class="stat-grid" id="trendSummary"></div>
      <div class="card chart-wrap" style="margin-top:12px;">
        <svg id="weightChart" class="chart" viewBox="0 0 920 280" role="img" aria-label="体重变化曲线"></svg>
      </div>

      <div class="section-title">
        <div>
          <h2>历史记录</h2>
          <p>点击载入某天继续修改，也可以删除测试记录</p>
        </div>
      </div>
      <div class="actions" style="margin-bottom:12px;">
        <button class="btn warn full" id="clearAllLogs" type="button">清空全部记录</button>
      </div>
      <div class="history" id="history"></div>
    </section>

    <section class="screen" data-screen="profile">
      <div class="section-title">
        <div>
          <h2>我的目标</h2>
          <p>默认按你本人和 532 比例计算</p>
        </div>
      </div>
      <div class="card">
        <div class="form-grid">
          <label><span>性别</span><select id="sex"><option value="male">男</option><option value="female">女</option></select></label>
          <label><span>年龄</span><input id="age" type="number" min="12" max="90"></label>
          <label><span>身高 cm</span><input id="height" type="number" min="120" max="230"></label>
          <label><span>体重 kg</span><input id="weight" type="number" min="30" max="250" step="0.1"></label>
          <label><span>目标体重 kg</span><input id="targetWeight" type="number" min="30" max="250" step="0.1"></label>
          <label><span>理想速度 kg/周</span><input id="weeklyGoal" type="number" min="0.1" max="1.5" step="0.1"></label>
          <label><span>活动量</span><select id="activity">
            <option value="1.2">久坐，很少运动</option>
            <option value="1.375">轻量活动，每周 1-3 次</option>
            <option value="1.55">中等活动，每周 3-5 次</option>
            <option value="1.6">力量训练 4-6 天，少有氧</option>
            <option value="1.725">高活动，每周 6-7 次</option>
            <option value="1.9">体力劳动或高强度训练</option>
          </select></label>
          <label><span>目标</span><select id="goal">
            <option value="loss">减脂</option>
            <option value="slow-loss">温和减脂</option>
            <option value="maintain">维持</option>
            <option value="gain">增肌</option>
          </select></label>
          <label class="full"><span>碳蛋脂模式</span><select id="macroMode">
            <option value="532">532：热量按碳水 50% / 蛋白 30% / 脂肪 20%</option>
            <option value="auto">自定义保蛋白：先按 g/kg 定蛋白和脂肪，剩余给碳水</option>
          </select></label>
          <label><span>蛋白目标 g/kg</span><input id="proteinRate" type="number" min="1" max="2.8" step="0.1"></label>
          <label><span>脂肪目标 g/kg</span><input id="fatRate" type="number" min="0.4" max="1.3" step="0.1"></label>
        </div>
        <div class="actions">
          <button class="btn" id="saveProfile" type="button">保存目标</button>
          <button class="btn secondary" id="resetProfile" type="button">恢复默认</button>
        </div>
      </div>

      <div class="section-title">
        <div>
          <h2>今日目标</h2>
          <p id="profileHint"></p>
        </div>
      </div>
      <div class="stat-grid" id="targetSummary"></div>

      <div class="section-title">
        <div>
          <h2>数据迁移</h2>
          <p>换手机或部署到网页后可以导出导入</p>
        </div>
      </div>
      <div class="card">
        <div class="actions">
          <button class="btn secondary" id="exportData" type="button">导出数据</button>
          <button class="btn secondary" id="importData" type="button">导入数据</button>
        </div>
        <textarea id="dataBox" placeholder="导出的数据会显示在这里；导入时把数据粘贴进来再点导入。"></textarea>
      </div>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="主导航">
    <button class="active" type="button" data-nav="home">首页</button>
    <button type="button" data-nav="log">记录</button>
    <button type="button" data-nav="trend">趋势</button>
    <button type="button" data-nav="profile">我的</button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    const storeKey = "diet-tool-v1";
    const todayISO = new Date().toISOString().slice(0, 10);
    const defaultProfile = {
      sex: "male",
      age: 23,
      height: 169,
      weight: 80,
      targetWeight: 78,
      weeklyGoal: 0.4,
      activity: "1.6",
      goal: "slow-loss",
      proteinRate: 2,
      fatRate: 0.7,
      macroMode: "532"
    };
    const mainMealKeys = ["breakfast", "lunch", "dinner"];
    const snackMealKeys = ["morningSnack", "afternoonSnack", "eveningSnack"];
    const mealKeys = mainMealKeys.concat(snackMealKeys);
    const mealLabels = {
      breakfast: "早餐",
      lunch: "午餐",
      dinner: "晚餐",
      morningSnack: "上午加餐",
      afternoonSnack: "下午加餐",
      eveningSnack: "晚上加餐"
    };
    const profileFields = ["sex", "age", "height", "weight", "targetWeight", "weeklyGoal", "activity", "goal", "proteinRate", "fatRate", "macroMode"];

    let activeMeal = "breakfast";
    let deferredInstallPrompt = null;
    const state = loadState();

    normalizeState();
    applyProfile(state.profile);
    document.getElementById("logDate").value = todayISO;
    hydrateLog(todayISO);
    bindEvents();
    render();

    function bindEvents() {
      document.querySelectorAll("[data-nav], [data-go]").forEach((button) => {
        button.addEventListener("click", () => showScreen(button.dataset.nav || button.dataset.go));
      });
      document.querySelectorAll("[data-meal-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          activeMeal = button.dataset.mealTab;
          renderMealTabs();
          clearMealEditor();
        });
      });
      document.getElementById("snackToggle").addEventListener("click", () => {
        document.getElementById("snackTabs").classList.toggle("show");
      });

      document.getElementById("logDate").addEventListener("change", () => {
        hydrateLog(value("logDate") || todayISO);
        render();
      });
      ["bodyWeight", "note", "mealCalories", "mealCarbs", "mealProtein", "mealFat"].forEach((id) => {
        document.getElementById(id).addEventListener("input", () => {
          render();
        });
        if (id.startsWith("meal")) {
          document.getElementById(id).addEventListener("focus", (event) => {
            if (event.target.value === "0") event.target.value = "";
          });
        }
      });
      ["trendStart", "trendEnd"].forEach((id) => {
        document.getElementById(id).addEventListener("change", renderTrend);
      });
      document.getElementById("last7Trend").addEventListener("click", () => {
        setDefaultTrendRange();
        renderTrend();
      });
      document.getElementById("allTrend").addEventListener("click", () => {
        const entries = weightEntries();
        if (!entries.length) return;
        document.getElementById("trendStart").value = entries[0].date;
        document.getElementById("trendEnd").value = entries[entries.length - 1].date;
        renderTrend();
      });
      profileFields.forEach((id) => {
        document.getElementById(id).addEventListener("change", () => {
          state.profile = readProfile();
          persist();
          render();
        });
        document.getElementById(id).addEventListener("input", () => {
          state.profile = readProfile();
          persist();
          render();
        });
      });

      document.getElementById("saveLog").addEventListener("click", () => {
        const entry = readMealEditor();
        const hasEntry = entry.calories + entry.carbs + entry.protein + entry.fat > 0;
        if (hasEntry) appendEntry(activeMeal, entry);
        const log = currentDraftLog();
        state.logs[log.date] = log;
        persist();
        hydrateLog(log.date);
        render();
        const score = scoreLog(log, calculateTargets(readProfile())).score;
        const title = hasEntry ? `已追加到${mealLabels[activeMeal]}` : "已保存体重/备注";
        toast(`<strong>${title}</strong>今日任务 ${score}/100，当前总热量 ${round(log.calories)} kcal`);
        flashSaveButton();
      });

      document.getElementById("copyMeal").addEventListener("click", () => {
        const entry = readMealEditor();
        const next = activeMeal === "breakfast" ? "lunch" : activeMeal === "lunch" ? "dinner" : "breakfast";
        writeMealEditor(entry);
        activeMeal = next;
        renderMealTabs();
        render();
        toast(`<strong>已切到${mealLabels[next]}</strong>输入框内容已保留，确认后点追加。`);
      });

      document.getElementById("clearMeal").addEventListener("click", () => {
        clearMealEditor();
        render();
      });
      document.getElementById("clearAllLogs").addEventListener("click", () => {
        if (!confirm("确定清空全部记录吗？适合测试结束后重新开始。")) return;
        state.logs = {};
        persist();
        hydrateLog(todayISO);
        document.getElementById("trendStart").value = "";
        document.getElementById("trendEnd").value = "";
        render();
        toast("<strong>已清空全部记录</strong>可以从正式应用那天重新开始。");
      });

      document.getElementById("saveProfile").addEventListener("click", () => {
        state.profile = readProfile();
        persist();
        render();
        toast("目标已保存");
      });
      document.getElementById("resetProfile").addEventListener("click", () => {
        state.profile = { ...defaultProfile };
        applyProfile(state.profile);
        persist();
        render();
        toast("已恢复你的默认数据");
      });
      document.getElementById("exportData").addEventListener("click", () => {
        document.getElementById("dataBox").value = JSON.stringify(state, null, 2);
        toast("数据已导出到文本框");
      });
      document.getElementById("importData").addEventListener("click", () => {
        try {
          const next = JSON.parse(document.getElementById("dataBox").value);
          if (!next || !next.logs) throw new Error("bad data");
          state.profile = next.profile || defaultProfile;
          state.logs = next.logs || {};
          normalizeState();
          applyProfile(state.profile);
          persist();
          hydrateLog(value("logDate") || todayISO);
          render();
          toast("导入成功");
        } catch {
          toast("导入失败：请检查数据格式");
        }
      });

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        document.getElementById("installBtn").style.display = "inline-flex";
      });
      document.getElementById("installBtn").addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        document.getElementById("installBtn").style.display = "none";
      });
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storeKey)) || { profile: null, logs: {} };
      } catch {
        return { profile: null, logs: {} };
      }
    }

    function normalizeState() {
      if (!state.profile || isOldExampleProfile(state.profile)) state.profile = { ...defaultProfile };
      state.profile = { ...defaultProfile, ...state.profile };
      if (!state.profile.targetWeight) state.profile.targetWeight = defaultProfile.targetWeight;
      if (!state.profile.weeklyGoal) state.profile.weeklyGoal = defaultProfile.weeklyGoal;
      state.logs = state.logs || {};
      Object.keys(state.logs).forEach((date) => {
        const log = state.logs[date];
        if (!log.meals) log.meals = legacyMeals(log);
        log.meals = normalizeMeals(log.meals);
        const totals = totalMeals(log.meals);
        log.date = log.date || date;
        log.calories = totals.calories;
        log.carbs = totals.carbs;
        log.protein = totals.protein;
        log.fat = totals.fat;
      });
    }

    function persist() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function showScreen(name) {
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === name);
      });
      document.querySelectorAll("[data-nav]").forEach((button) => {
        button.classList.toggle("active", button.dataset.nav === name);
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function applyProfile(profile) {
      profileFields.forEach((id) => {
        if (document.getElementById(id)) document.getElementById(id).value = profile[id];
      });
    }

    function readProfile() {
      return {
        sex: value("sex"),
        age: num("age"),
        height: num("height"),
        weight: num("weight"),
        targetWeight: num("targetWeight"),
        weeklyGoal: num("weeklyGoal"),
        activity: value("activity"),
        goal: value("goal"),
        proteinRate: num("proteinRate"),
        fatRate: num("fatRate"),
        macroMode: value("macroMode")
      };
    }

    function hydrateLog(date) {
      const log = state.logs[date] || blankLog(date);
      document.getElementById("logDate").value = date;
      document.getElementById("bodyWeight").value = log.bodyWeight || "";
      document.getElementById("note").value = log.note || "";
      writeDraftMeals(normalizeMeals(log.meals || legacyMeals(log)));
      activeMeal = "breakfast";
      renderMealTabs();
      clearMealEditor();
    }

    function currentDraftLog() {
      const meals = getDraftMeals();
      const totals = totalMeals(meals);
      return {
        date: value("logDate") || todayISO,
        bodyWeight: num("bodyWeight"),
        note: value("note"),
        meals,
        calories: totals.calories,
        carbs: totals.carbs,
        protein: totals.protein,
        fat: totals.fat
      };
    }

    function blankLog(date) {
      return {
        date,
        bodyWeight: 0,
        note: "",
        meals: blankMeals(),
        calories: 0,
        carbs: 0,
        protein: 0,
        fat: 0
      };
    }

    function blankMeal() {
      return { calories: 0, carbs: 0, protein: 0, fat: 0 };
    }

    function blankMeals() {
      return mealKeys.reduce((meals, key) => {
        meals[key] = [];
        return meals;
      }, {});
    }

    function legacyMeals(log) {
      return {
        breakfast: [{
          calories: log.calories || 0,
          carbs: log.carbs || 0,
          protein: log.protein || 0,
          fat: log.fat || 0
        }],
        lunch: [],
        dinner: [],
        morningSnack: [],
        afternoonSnack: [],
        eveningSnack: []
      };
    }

    function normalizeMeals(meals) {
      const normalized = blankMeals();
      mealKeys.forEach((key) => {
        const value = meals?.[key];
        if (Array.isArray(value)) {
          normalized[key] = value.map(normalizeEntry).filter(hasFood);
        } else if (value && typeof value === "object") {
          const entry = normalizeEntry(value);
          normalized[key] = hasFood(entry) ? [entry] : [];
        }
      });
      return normalized;
    }

    function normalizeEntry(entry) {
      return {
        calories: Number(entry?.calories) || 0,
        carbs: Number(entry?.carbs) || 0,
        protein: Number(entry?.protein) || 0,
        fat: Number(entry?.fat) || 0,
        time: entry?.time || new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      };
    }

    function hasFood(entry) {
      return (entry.calories || 0) + (entry.carbs || 0) + (entry.protein || 0) + (entry.fat || 0) > 0;
    }

    function writeDraftMeals(meals) {
      sessionStorage.setItem("diet-draft-meals", JSON.stringify(meals));
    }

    function getDraftMeals() {
      try {
        const meals = JSON.parse(sessionStorage.getItem("diet-draft-meals"));
        return normalizeMeals(meals);
      } catch {
        return blankMeals();
      }
    }

    function writeMealEditor(meal) {
      document.getElementById("mealCalories").value = meal.calories || "";
      document.getElementById("mealCarbs").value = meal.carbs || "";
      document.getElementById("mealProtein").value = meal.protein || "";
      document.getElementById("mealFat").value = meal.fat || "";
    }

    function clearMealEditor() {
      writeMealEditor(blankMeal());
    }

    function readMealEditor() {
      return normalizeEntry({
        calories: num("mealCalories"),
        carbs: num("mealCarbs"),
        protein: num("mealProtein"),
        fat: num("mealFat")
      });
    }

    function appendEntry(mealKey, entry) {
      const meals = getDraftMeals();
      meals[mealKey] = meals[mealKey] || [];
      meals[mealKey].push({ ...entry, time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }) });
      writeDraftMeals(meals);
      clearMealEditor();
    }

    function totalMeals(meals) {
      return mealKeys.reduce((total, key) => {
        const entries = Array.isArray(meals[key]) ? meals[key] : [];
        entries.forEach((meal) => {
          total.carbs += meal.carbs || 0;
          total.protein += meal.protein || 0;
          total.fat += meal.fat || 0;
          total.calories += meal.calories || macroCalories(meal);
        });
        return total;
      }, { calories: 0, carbs: 0, protein: 0, fat: 0 });
    }

    function totalEntries(entries) {
      return entries.reduce((total, meal) => {
        total.carbs += meal.carbs || 0;
        total.protein += meal.protein || 0;
        total.fat += meal.fat || 0;
        total.calories += meal.calories || macroCalories(meal);
        return total;
      }, { calories: 0, carbs: 0, protein: 0, fat: 0 });
    }

    function render() {
      const profile = readProfile();
      const targets = calculateTargets(profile);
      const log = currentDraftLog();
      renderProfileMode(profile, targets);
      renderHome(targets, log);
      renderMealList(log);
      renderProgress(targets, log);
      renderAdvice(targets, log);
      renderTotals(log);
      renderTrend();
      renderHistory();
      renderMealTabs();
      document.getElementById("todayPill").textContent = formatDate(value("logDate") || todayISO);
    }

    function renderProfileMode(profile, targets) {
      const ratioMode = profile.macroMode === "532";
      document.getElementById("proteinRate").disabled = ratioMode;
      document.getElementById("fatRate").disabled = ratioMode;
      document.getElementById("macroModeLabel").textContent = ratioMode ? "532 比例分配" : "自定义保蛋白";
      document.getElementById("profileHint").textContent = ratioMode
        ? "532 模式下，g/kg 输入不会参与计算。"
        : "自定义模式会先锁蛋白和脂肪，再分配碳水。";
      const items = [
        ["热量", `${round(targets.calories)} kcal`],
        ["碳水", `${round(targets.carbs)} g`],
        ["蛋白", `${round(targets.protein)} g`],
        ["脂肪", `${round(targets.fat)} g`],
        ["目标体重", `${one(profile.targetWeight || 78)} kg`],
        ["理想速度", `${one(profile.weeklyGoal || 0.4)} kg/周`],
        ["维持", `${round(targets.maintenance)} kcal`],
        ["基础代谢", `${round(targets.bmr)} kcal`]
      ];
      document.getElementById("targetSummary").innerHTML = items.map(([label, val]) => stat(label, val)).join("");
    }

    function renderHome(targets, log) {
      const remaining = Math.max(0, targets.calories - log.calories);
      const score = scoreLog(log, targets);
      document.getElementById("remainingCalories").textContent = round(remaining);
      document.getElementById("questTitle").textContent = score.title;
      document.getElementById("questScore").textContent = `${score.score} / 100`;
      document.getElementById("questBar").style.width = `${score.score}%`;
      document.getElementById("streakPill").textContent = `连续 ${streakDays()} 天`;
    }

    function renderProgress(targets, log) {
      const macros = [
        ["碳水", log.carbs, targets.carbs],
        ["蛋白", log.protein, targets.protein],
        ["脂肪", log.fat, targets.fat]
      ];
      document.getElementById("macroGrid").innerHTML = macros.map(([label, eaten, target]) => {
        const pct = target ? Math.min(130, eaten / target * 100) : 0;
        return `
          <div class="macro">
            <span>${label}</span>
            <strong>${round(eaten)} / ${round(target)}g</strong>
            <div class="bar"><i style="width:${pct}%"></i></div>
          </div>
        `;
      }).join("");
    }

    function renderMealList(log) {
      const visibleKeys = mainMealKeys.concat(snackMealKeys.filter((key) => (log.meals[key] || []).length > 0));
      document.getElementById("mealList").innerHTML = visibleKeys.map((key) => {
        const entries = log.meals[key] || [];
        const totals = totalEntries(entries);
        const kcal = totals.calories;
        const filled = entries.length > 0;
        return `
          <button class="meal-row" type="button" onclick="openMeal('${key}')">
            <span>
              <h3>${mealLabels[key]}</h3>
              <p>${filled ? `${entries.length}次 · 碳 ${round(totals.carbs)}g · 蛋 ${round(totals.protein)}g · 脂 ${round(totals.fat)}g` : "还没记录"}</p>
              ${filled ? `<div class="entry-list">${entries.map((entry, index) => `<span class="entry-chip"><em>第${index + 1}次 ${entry.time || ""}</em><b>${round(entry.calories || macroCalories(entry))} kcal</b></span>`).join("")}</div>` : ""}
            </span>
            <span class="meal-score">${round(kcal)} kcal</span>
          </button>
        `;
      }).join("");
    }

    function renderMealTabs() {
      document.querySelectorAll("[data-meal-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mealTab === activeMeal);
      });
    }

    function openMeal(key) {
      activeMeal = key;
      renderMealTabs();
      if (snackMealKeys.includes(key)) document.getElementById("snackTabs").classList.add("show");
      clearMealEditor();
      showScreen("log");
    }

    function renderTotals(log) {
      const items = [
        ["热量", `${round(log.calories)} kcal`],
        ["碳水", `${round(log.carbs)} g`],
        ["蛋白", `${round(log.protein)} g`],
        ["脂肪", `${round(log.fat)} g`]
      ];
      document.getElementById("todayTotals").innerHTML = items.map(([label, val]) => stat(label, val)).join("");
    }

    function renderAdvice(targets, log) {
      const gaps = {
        calories: Math.max(0, targets.calories - log.calories),
        carbs: Math.max(0, targets.carbs - log.carbs),
        protein: Math.max(0, targets.protein - log.protein),
        fat: Math.max(0, targets.fat - log.fat)
      };
      const tips = [];
      if (log.calories === 0) tips.push("今天先记录第一餐，任务分会马上动起来。");
      if (gaps.protein >= 20) tips.push(`蛋白还差 ${round(gaps.protein)}g，优先补鸡胸、鱼虾、瘦牛肉、蛋清、无糖酸奶或豆腐。`);
      if (gaps.carbs >= 40) tips.push(`碳水还差 ${round(gaps.carbs)}g，训练日前后可以补米饭、土豆、燕麦或全麦面包。`);
      if (gaps.fat >= 12) tips.push(`脂肪还差 ${round(gaps.fat)}g，少量坚果、全蛋、三文鱼或橄榄油更合适。`);
      if (!tips.length) tips.push("今天的碳蛋脂已经接近目标。剩下就看饱腹感、蔬菜、水和睡眠。");
      document.getElementById("adviceBox").innerHTML = tips.join("<br>");
    }

    function renderTrend() {
      const entries = weightEntries();
      const summary = document.getElementById("trendSummary");
      if (!entries.length) {
        summary.innerHTML = [stat("当前晨重", "暂无"), stat("7 日均重", "暂无"), stat("7 日变化", "暂无")].join("");
        document.getElementById("weightChart").innerHTML = `<text x="460" y="145" text-anchor="middle" class="chart-label">保存晨重后显示曲线</text>`;
        document.getElementById("trendAdvice").textContent = "先记录晨重，至少 2 个不同日期后才能判断速度。";
        return;
      }
      ensureTrendRange(entries);
      const rangeEntries = filterTrendRange(entries);
      if (!rangeEntries.length) {
        summary.innerHTML = [stat("区间", "无数据"), stat("天数", "0 天"), stat("变化", "暂无")].join("");
        document.getElementById("weightChart").innerHTML = `<text x="460" y="145" text-anchor="middle" class="chart-label">这个区间没有晨重记录</text>`;
        document.getElementById("trendAdvice").textContent = "换一个有晨重记录的区间再看。";
        return;
      }
      const latest = rangeEntries[rangeEntries.length - 1];
      const first = rangeEntries[0];
      const profile = readProfile();
      const targetWeight = profile.targetWeight || 78;
      const idealWeekly = profile.weeklyGoal || 0.4;
      const days = inclusiveDays(value("trendStart"), value("trendEnd"));
      const actualSpan = Math.max(1, inclusiveDays(first.date, latest.date));
      const totalChange = latest.bodyWeight - first.bodyWeight;
      const weeklyChange = actualSpan > 1 ? totalChange / (actualSpan - 1) * 7 : null;
      const last7 = entries.slice(-7);
      const prev7 = entries.slice(-14, -7);
      const lastAvg = avg(last7.map((item) => item.bodyWeight));
      const prevAvg = prev7.length ? avg(prev7.map((item) => item.bodyWeight)) : null;
      const change = prevAvg === null ? null : lastAvg - prevAvg;
      const gap = latest.bodyWeight - targetWeight;
      const currentEta = estimateTargetDate(latest.date, latest.bodyWeight, targetWeight, weeklyChange === null ? null : Math.abs(Math.min(weeklyChange, 0)));
      const idealEta = estimateTargetDate(latest.date, latest.bodyWeight, targetWeight, idealWeekly);
      summary.innerHTML = [
        stat("区间天数", `${days} 天`),
        stat("区间变化", signed(totalChange, "kg")),
        stat("平均每周", weeklyChange === null ? "数据不足" : signed(weeklyChange, "kg/周")),
        stat("最新晨重", `${one(latest.bodyWeight)} kg`),
        stat("最近 7 日均重", `${one(lastAvg)} kg`),
        stat(`距 ${one(targetWeight)}kg`, gap <= 0 ? "已达成" : `${one(gap)} kg`),
        stat("当前速度预计", currentEta),
        stat("理想速度预计", idealEta),
        stat("整体判断", speedText(weeklyChange)),
        stat("连续记录", `${streakDays()} 天`)
      ].join("");
      document.getElementById("trendAdvice").innerHTML = trendAdvice(weeklyChange, totalChange, days, latest, profile);
      renderWeightChart(rangeEntries, targetWeight);
    }

    function weightEntries() {
      return Object.values(state.logs)
        .filter((log) => log.bodyWeight > 0)
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function ensureTrendRange(entries) {
      const startInput = document.getElementById("trendStart");
      const endInput = document.getElementById("trendEnd");
      if (startInput.value && endInput.value) return;
      const latest = entries[entries.length - 1].date;
      const start = addDays(latest, -6);
      startInput.value = entries.find((entry) => entry.date >= start)?.date || entries[0].date;
      endInput.value = latest;
    }

    function setDefaultTrendRange() {
      const entries = weightEntries();
      if (!entries.length) return;
      const latest = entries[entries.length - 1].date;
      const start = addDays(latest, -6);
      document.getElementById("trendStart").value = entries.find((entry) => entry.date >= start)?.date || entries[0].date;
      document.getElementById("trendEnd").value = latest;
    }

    function filterTrendRange(entries) {
      let start = value("trendStart");
      let end = value("trendEnd");
      if (start && end && start > end) [start, end] = [end, start];
      return entries.filter((entry) => (!start || entry.date >= start) && (!end || entry.date <= end));
    }

    function inclusiveDays(start, end) {
      if (!start || !end) return 0;
      const a = new Date(start + "T00:00:00");
      const b = new Date(end + "T00:00:00");
      return Math.abs(Math.round((b - a) / 86400000)) + 1;
    }

    function addDays(date, days) {
      const d = new Date(date + "T00:00:00");
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function speedText(weeklyChange) {
      if (weeklyChange === null) return "数据不足";
      if (weeklyChange <= -0.9) return "偏快";
      if (weeklyChange <= -0.25) return "合适";
      if (weeklyChange < 0.15) return "偏慢/平台";
      return "回升";
    }

    function estimateTargetDate(fromDate, currentWeight, targetWeight, weeklyLoss) {
      const gap = currentWeight - targetWeight;
      if (gap <= 0) return "已达成";
      if (!weeklyLoss || weeklyLoss <= 0.02) return "暂无法估算";
      const daysNeeded = Math.ceil(gap / weeklyLoss * 7);
      return `${addDays(fromDate, daysNeeded)}（约${daysNeeded}天）`;
    }

    function trendAdvice(weeklyChange, totalChange, days, latest, profile) {
      if (weeklyChange === null) return "至少需要 2 个晨重记录，才能判断这个区间的速度。";
      const absWeekly = Math.abs(weeklyChange);
      const targetWeight = profile.targetWeight || 78;
      const idealWeekly = profile.weeklyGoal || 0.4;
      const gap = latest.bodyWeight - targetWeight;
      const eta = estimateTargetDate(latest.date, latest.bodyWeight, targetWeight, weeklyChange < 0 ? absWeekly : 0);
      const idealEta = estimateTargetDate(latest.date, latest.bodyWeight, targetWeight, idealWeekly);
      const targetLine = gap <= 0
        ? `你已经低于目标体重 ${one(targetWeight)}kg，接下来重点是稳定 7 日均重。`
        : `距离目标 ${one(targetWeight)}kg 还差 ${one(gap)}kg。按当前速度预计：${eta}；按理想速度 ${one(idealWeekly)}kg/周预计：${idealEta}。`;
      if (weeklyChange <= -0.9) {
        return `<strong>速度偏快：</strong>${days} 天总变化 ${signed(totalChange, "kg")}，折算约 ${signed(weeklyChange, "kg/周")}。${targetLine} 建议先别继续猛砍热量：每天加回 100-200 kcal，优先加碳水；训练表现下降、睡眠变差或很饿时，减少有氧或安排 1-2 天维持热量。`;
      }
      if (absWeekly >= idealWeekly * 0.65 && absWeekly <= idealWeekly * 1.35 && weeklyChange < 0) {
        return `<strong>节奏贴近理想：</strong>${days} 天总变化 ${signed(totalChange, "kg")}，折算约 ${signed(weeklyChange, "kg/周")}。${targetLine} 先保持当前热量和训练，继续看 7 日均重，不需要急着调整。`;
      }
      if (weeklyChange <= -0.25) {
        return `<strong>节奏不错：</strong>${days} 天总变化 ${signed(totalChange, "kg")}，折算约 ${signed(weeklyChange, "kg/周")}。${targetLine} 如果训练状态好可以保持；如果明显比理想速度快，就每天加回 50-100 kcal。`;
      }
      if (weeklyChange < 0.15) {
        return `<strong>偏慢或平台：</strong>${days} 天总变化 ${signed(totalChange, "kg")}，折算约 ${signed(weeklyChange, "kg/周")}。${targetLine} 如果这个状态持续 10-14 天，可以每天减少 100-150 kcal，优先从脂肪或零食里扣；或者每周加 2-3 次 20-30 分钟低强度有氧。`;
      }
      return `<strong>体重回升：</strong>${days} 天总变化 ${signed(totalChange, "kg")}，折算约 +${one(absWeekly)} kg/周。${targetLine} 先检查盐分、碳水、外食和睡眠；如果 7 日均重也连续上升，再把每日热量下调 150 kcal 或恢复每周 2 次有氧。`;
    }

    function renderWeightChart(entries, targetWeight = 78) {
      const svg = document.getElementById("weightChart");
      const w = 920;
      const h = 280;
      const pad = { left: 48, right: 18, top: 18, bottom: 34 };
      const avgPoints = entries.map((item, index) => ({
        date: item.date,
        bodyWeight: avg(entries.slice(Math.max(0, index - 6), index + 1).map((row) => row.bodyWeight))
      }));
      const values = entries.map((item) => item.bodyWeight).concat(avgPoints.map((item) => item.bodyWeight), [targetWeight]);
      const min = Math.floor((Math.min(...values) - 0.6) * 10) / 10;
      const max = Math.ceil((Math.max(...values) + 0.6) * 10) / 10;
      const x = (index) => entries.length === 1 ? w / 2 : pad.left + index * ((w - pad.left - pad.right) / (entries.length - 1));
      const y = (value) => pad.top + (max - value) * ((h - pad.top - pad.bottom) / (max - min || 1));
      const path = (points) => points.map((point, index) => `${index ? "L" : "M"} ${x(index).toFixed(1)} ${y(point.bodyWeight).toFixed(1)}`).join(" ");
      const ticks = [min, (min + max) / 2, max];
      const targetY = y(targetWeight);
      svg.innerHTML = `
        <rect x="0" y="0" width="${w}" height="${h}" fill="#fffdf8"></rect>
        ${ticks.map((tick) => `<line x1="${pad.left}" x2="${w - pad.right}" y1="${y(tick)}" y2="${y(tick)}" stroke="#ded8ca"></line><text x="10" y="${y(tick) + 4}" class="chart-label">${one(tick)}kg</text>`).join("")}
        <line x1="${pad.left}" x2="${w - pad.right}" y1="${targetY}" y2="${targetY}" stroke="#8f978c" stroke-dasharray="5 5"></line>
        <text x="${w - pad.right - 78}" y="${targetY - 7}" class="chart-label">${one(targetWeight)}kg 目标</text>
        <path d="${path(entries)}" fill="none" stroke="#2f6f4e" stroke-width="3"></path>
        <path d="${path(avgPoints)}" fill="none" stroke="#d88a3d" stroke-width="3"></path>
        ${entries.map((item, index) => `<circle cx="${x(index)}" cy="${y(item.bodyWeight)}" r="4" fill="#2f6f4e"></circle>`).join("")}
        <text x="${pad.left}" y="${h - 10}" class="chart-label">${entries[0].date}</text>
        <text x="${w - pad.right}" y="${h - 10}" text-anchor="end" class="chart-label">${entries[entries.length - 1].date}</text>
      `;
    }

    function renderHistory() {
      const entries = Object.values(state.logs).sort((a, b) => b.date.localeCompare(a.date));
      const history = document.getElementById("history");
      if (!entries.length) {
        history.innerHTML = '<div class="empty">还没有历史记录。保存今天后会显示在这里。</div>';
        return;
      }
      history.innerHTML = entries.map((log) => {
        const score = scoreLog(log, calculateTargets(readProfile())).score;
        return `
          <div class="history-item">
            <div>
              <strong>${log.date} · ${score}分</strong>
              <p>${log.bodyWeight ? `晨重 ${one(log.bodyWeight)}kg · ` : ""}热量 ${round(log.calories)} kcal · 碳 ${round(log.carbs)}g · 蛋 ${round(log.protein)}g · 脂 ${round(log.fat)}g</p>
              <p>${mealSummary(log)}</p>
            </div>
            <div style="display:grid;gap:8px;">
              <button class="btn secondary" type="button" onclick="loadHistory('${log.date}')">载入</button>
              <button class="btn warn" type="button" onclick="deleteLog('${log.date}')">删除</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function loadHistory(date) {
      hydrateLog(date);
      render();
      showScreen("log");
    }

    function deleteLog(date) {
      if (!confirm(`确定删除 ${date} 的记录吗？`)) return;
      delete state.logs[date];
      persist();
      hydrateLog(value("logDate") || todayISO);
      document.getElementById("trendStart").value = "";
      document.getElementById("trendEnd").value = "";
      render();
      toast(`<strong>已删除 ${date}</strong>测试记录清掉了。`);
    }

    function mealSummary(log) {
      const meals = log.meals || legacyMeals(log);
      return mealKeys.map((key) => {
        const entries = Array.isArray(meals[key]) ? meals[key] : [];
        if (!entries.length) return "";
        const totals = totalEntries(entries);
        return `${mealLabels[key]} ${entries.length}次：碳${round(totals.carbs)} 蛋${round(totals.protein)} 脂${round(totals.fat)}`;
      }).filter(Boolean).join(" · ") || "暂无餐次";
    }

    function scoreLog(log, targets) {
      let score = 0;
      const entryCount = mealKeys.reduce((count, key) => count + (log.meals?.[key]?.length || 0), 0);
      const mainMealsDone = mainMealKeys.filter((key) => (log.meals?.[key]?.length || 0) > 0).length;
      score += Math.min(30, mainMealsDone * 10 + Math.max(0, entryCount - mainMealsDone) * 4);
      if (log.bodyWeight > 0) score += 15;
      score += rangeScore(log.calories, targets.calories, 30);
      score += rangeScore(log.protein, targets.protein, 15);
      score += rangeScore(log.carbs, targets.carbs, 10);
      score += rangeScore(log.fat, targets.fat, 10);
      score = Math.min(100, Math.round(score));
      return {
        score,
        title: score >= 85 ? "今天很稳" : score >= 60 ? "任务进行中" : "先完成一餐"
      };
    }

    function rangeScore(value, target, points) {
      if (!target || !value) return 0;
      const ratio = value / target;
      if (ratio >= 0.9 && ratio <= 1.08) return points;
      if (ratio >= 0.75 && ratio <= 1.18) return Math.round(points * 0.7);
      if (ratio >= 0.55 && ratio <= 1.3) return Math.round(points * 0.4);
      return 0;
    }

    function streakDays() {
      let streak = 0;
      const cursor = new Date(todayISO + "T00:00:00");
      while (true) {
        const date = cursor.toISOString().slice(0, 10);
        const log = state.logs[date];
        if (!log || (log.calories <= 0 && !log.bodyWeight)) break;
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function calculateTargets(profile) {
      const sexOffset = profile.sex === "male" ? 5 : -161;
      const bmr = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age + sexOffset;
      const maintenance = bmr * Number(profile.activity);
      const goalFactor = { loss: 0.82, "slow-loss": 0.9, maintain: 1, gain: 1.08 }[profile.goal] || 0.9;
      const calories = Math.max(1200, maintenance * goalFactor);
      if (profile.macroMode === "532") {
        return { bmr, maintenance, calories, carbs: calories * 0.5 / 4, protein: calories * 0.3 / 4, fat: calories * 0.2 / 9 };
      }
      const protein = profile.weight * profile.proteinRate;
      const fat = profile.weight * profile.fatRate;
      const carbs = Math.max(0, (calories - protein * 4 - fat * 9) / 4);
      return { bmr, maintenance, calories, carbs, protein, fat };
    }

    function macroCalories(meal) {
      return meal.carbs * 4 + meal.protein * 4 + meal.fat * 9;
    }

    function stat(label, value) {
      return `<div class="flat-card stat"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function value(id) {
      return document.getElementById(id).value;
    }

    function num(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function round(value) {
      return Math.round(Number(value) || 0);
    }

    function one(value) {
      return (Number(value) || 0).toFixed(1);
    }

    function avg(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function signed(value, unit) {
      const prefix = value > 0 ? "+" : "";
      return `${prefix}${one(value)} ${unit}`;
    }

    function trendText(change) {
      if (change === null) return "先记录 14 天";
      if (change <= -0.7) return "下降偏快";
      if (change <= -0.2) return "节奏很好";
      if (change < 0.2) return "基本平台";
      return "可能回升";
    }

    function formatDate(date) {
      const d = new Date(date + "T00:00:00");
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function isOldExampleProfile(profile) {
      return profile.sex === "female" && Number(profile.age) === 28 && Number(profile.height) === 165 && Number(profile.weight) === 65;
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.innerHTML = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    function flashSaveButton() {
      const button = document.getElementById("saveLog");
      const oldText = button.textContent;
      button.textContent = "已记上";
      button.style.background = "var(--good)";
      clearTimeout(flashSaveButton.timer);
      flashSaveButton.timer = setTimeout(() => {
        button.textContent = oldText;
        button.style.background = "";
      }, 1200);
    }
  </script>
</body>
</html>
